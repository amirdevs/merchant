name: ChatGPT Written Item Copy PR

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  write-copy:
    runs-on: ubuntu-latest
    steps:
      - name: Generate and commit static item copy
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/amirdevs/merchant.git"
          git config core.sparseCheckout true
          mkdir -p .git/info
          cat > .git/info/sparse-checkout <<'EOF'
          .github/workflows/*
          scripts/run-embedded-item-copy.cjs
          src/data/generated/*
          src/lib/*
          docs/content/*
          EOF
          git fetch -q --depth=1 origin "${BRANCH_NAME}"
          git checkout -q -B "${BRANCH_NAME}" FETCH_HEAD
          node scripts/run-embedded-item-copy.cjs
          git config user.name "chatgpt-written-item-copy"
          git config user.email "chatgpt-written-item-copy@users.noreply.github.com"
          git add -A .
          git status --short
          git commit -m "Add written static copy for all items"
          git push origin HEAD:"${BRANCH_NAME}"
