name: ChatGPT Written Item Copy PR

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  write-copy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 1
          lfs: false
          show-progress: false
          sparse-checkout: |
            .github/workflows
            scripts/run-embedded-item-copy.cjs
            src/data/generated/items.json
            src/lib
            docs/content
          sparse-checkout-cone-mode: false
      - name: Generate static item copy
        run: |
          git pull --ff-only origin ${{ github.head_ref || github.ref_name }}
          node scripts/run-embedded-item-copy.cjs
      - name: Commit review files
        run: |
          git config user.name "chatgpt-written-item-copy"
          git config user.email "chatgpt-written-item-copy@users.noreply.github.com"
          git add -A .
          git commit -m "Add written static copy for all items"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
