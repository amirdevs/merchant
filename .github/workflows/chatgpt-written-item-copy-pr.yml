name: ChatGPT Written Item Copy PR

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  write-copy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 1
          lfs: false
      - name: Extract and run embedded writer
        run: |
          node <<'JS'
          const fs = require('fs');
          const source = fs.readFileSync('.github/workflows/chatgpt-written-item-copy.yml', 'utf8').split('\n');
          const start = source.findIndex((line) => line.includes("node <<'JS'"));
          const end = source.findIndex((line, index) => index > start && line.trim() === 'JS');
          if (start < 0 || end < 0) throw new Error('Could not find embedded writer script.');
          const script = source.slice(start + 1, end).map((line) => line.replace(/^          /, '')).join('\n');
          fs.writeFileSync('/tmp/write-item-copy.cjs', script);
          JS
          node /tmp/write-item-copy.cjs
      - name: Commit generated static copy
        run: |
          git config user.name "chatgpt-written-item-copy"
          git config user.email "chatgpt-written-item-copy@users.noreply.github.com"
          git rm .github/workflows/chatgpt-written-item-copy.yml .github/workflows/chatgpt-written-item-copy-pr.yml
          git add src/data/generated/item-written-descriptions.json src/lib/item-static-description.ts docs/content/written-item-descriptions.md
          git commit -m "Add written static copy for all items"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
