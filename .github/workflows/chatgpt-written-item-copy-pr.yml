name: ChatGPT Written Item Copy PR

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  write-copy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 1
          lfs: false
          sparse-checkout: |
            .github/workflows
            scripts/run-embedded-item-copy.cjs
            src/data/generated/items.json
            src/lib
            docs/content
          sparse-checkout-cone-mode: false
      - name: Run written item copy authoring
        run: node scripts/run-embedded-item-copy.cjs
      - name: Commit generated static copy
        run: |
          git config user.name "chatgpt-written-item-copy"
          git config user.email "chatgpt-written-item-copy@users.noreply.github.com"
          git rm .github/workflows/chatgpt-written-item-copy.yml .github/workflows/chatgpt-written-item-copy-pr.yml scripts/run-embedded-item-copy.cjs
          git add src/data/generated/item-written-descriptions.json src/lib/item-static-description.ts docs/content/written-item-descriptions.md
          git commit -m "Add written static copy for all items"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
