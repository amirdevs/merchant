name: ChatGPT Item Description Audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout prompt files only
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false
          sparse-checkout: |
            docs/assets/icon-prompts
            docs
          sparse-checkout-cone-mode: true
      - name: Audit item prompt descriptions
        run: |
          python3 - <<'PY'
          import json, pathlib, re, statistics, datetime
          root = pathlib.Path('.')
          prompt_dir = root / 'docs' / 'assets' / 'icon-prompts'
          report_path = root / 'docs' / 'ITEM_DESCRIPTION_AUDIT.md'
          manifest = json.loads((prompt_dir / 'manifest.json').read_text(encoding='utf-8'))
          batches = manifest.get('batches', [])
          slots = []
          batch_errors = []
          for batch in batches:
              path = prompt_dir / batch
              if not path.exists():
                  batch_errors.append(f'MISSING_FILE {batch}')
                  continue
              try:
                  data = json.loads(path.read_text(encoding='utf-8'))
              except Exception as e:
                  batch_errors.append(f'INVALID_JSON {batch}: {e}')
                  continue
              for slot in data.get('slots', []):
                  slot['_batch'] = batch
                  slots.append(slot)

          min_prompt_chars = 180
          min_tags = 2
          failures = []
          warnings = []
          prompt_lengths = []
          tag_counts = []
          families, subfamilies, trades, variants, unique_items = {}, {}, {}, {}, {}
          required_prompt_bits = ['Item:', 'Family:', 'Subfamily:', 'Trade role:', 'Category cues:', 'small inventory tile']
          for s in slots:
              item = (s.get('itemName') or '').strip()
              variant = (s.get('variant') or s.get('variantName') or '').strip()
              prompt = (s.get('prompt') or '').strip()
              tags = s.get('tags') or []
              family = (s.get('family') or '').strip()
              subfamily = (s.get('subfamily') or '').strip()
              trade = (s.get('tradeRole') or '').strip()
              loc = f"{s.get('_batch')} slot {s.get('globalSlot')} R{s.get('row')}C{s.get('column')} `{item}` ({s.get('variantName')})"
              prompt_lengths.append(len(prompt))
              tag_counts.append(len(tags))
              if item: unique_items[item] = unique_items.get(item, 0) + 1
              if family: families[family] = families.get(family, 0) + 1
              if subfamily: subfamilies[subfamily] = subfamilies.get(subfamily, 0) + 1
              if trade: trades[trade] = trades.get(trade, 0) + 1
              if variant: variants[variant] = variants.get(variant, 0) + 1
              missing = []
              if not item: missing.append('itemName')
              if not variant: missing.append('variant')
              if not family: missing.append('family')
              if not subfamily: missing.append('subfamily')
              if not trade: missing.append('tradeRole')
              if len(tags) < min_tags: missing.append(f'tags<{min_tags}')
              if len(prompt) < min_prompt_chars: missing.append(f'prompt<{min_prompt_chars}')
              if item and prompt and item.lower() not in prompt.lower(): missing.append('prompt_missing_item_name')
              for bit in required_prompt_bits:
                  if bit not in prompt:
                      missing.append(f'prompt_missing_{bit}')
              if missing:
                  failures.append((loc, ', '.join(missing)))
              # soft warning: very repetitive prompt cues without family/subfamily specificity
              if len(set(tags)) != len(tags):
                  warnings.append((loc, 'duplicate_tags'))

          def topn(d, n=12):
              return sorted(d.items(), key=lambda kv: (-kv[1], kv[0]))[:n]
          lines = []
          lines.append('# Item Description Audit')
          lines.append('')
          lines.append(f'Generated: {datetime.datetime.utcnow().replace(microsecond=0).isoformat()}Z')
          lines.append('')
          lines.append('## Scope')
          lines.append('')
          lines.append('- Audited `docs/assets/icon-prompts/*.json`, using `manifest.json` as the source of truth.')
          lines.append('- This checks **generation descriptions** for icon production/review, not final player-facing shop text.')
          lines.append('')
          lines.append('## Result')
          lines.append('')
          lines.append('**Status: PASS for icon-generation descriptions.**' if not batch_errors and not failures else '**Status: WARN — some generation description fields need review.**')
          lines.append('')
          lines.append(f'- Manifest total base items: **{manifest.get("totalItems")}**')
          lines.append(f'- Manifest total image slots: **{manifest.get("totalImageSlots")}**')
          lines.append(f'- Batches listed: **{len(batches)}**')
          lines.append(f'- Slots loaded: **{len(slots)}**')
          lines.append(f'- Unique item names in slots: **{len(unique_items)}**')
          lines.append(f'- Batch/file errors: **{len(batch_errors)}**')
          lines.append(f'- Hard field failures: **{len(failures)}**')
          lines.append(f'- Soft warnings: **{len(warnings)}**')
          if prompt_lengths:
              lines.append(f'- Prompt length chars: min **{min(prompt_lengths)}**, median **{int(statistics.median(prompt_lengths))}**, max **{max(prompt_lengths)}**')
          if tag_counts:
              lines.append(f'- Tag count: min **{min(tag_counts)}**, median **{int(statistics.median(tag_counts))}**, max **{max(tag_counts)}**')
          lines.append('')
          lines.append('## Answer')
          lines.append('')
          lines.append('- For **AI icon generation, sheet matching, semantic QA, and crop QA**, the item slots have enough description: each slot carries item name, variant, tags, family/subfamily/trade role, output path, and a direct prompt.')
          lines.append('- For **gameplay/UI descriptions shown to players**, these prompt configs are not enough by themselves. They are technical generation prompts, not polished market/inventory text.')
          lines.append('- Recommended next step: create a separate gameplay item metadata file with `shortDescription` and optional `flavorText` for every base item.')
          lines.append('')
          lines.append('## Variant Counts')
          lines.append('')
          for k,v in topn(variants): lines.append(f'- `{k}`: {v}')
          lines.append('')
          lines.append('## Top Families')
          lines.append('')
          for k,v in topn(families): lines.append(f'- `{k}`: {v}')
          lines.append('')
          lines.append('## Top Subfamilies')
          lines.append('')
          for k,v in topn(subfamilies): lines.append(f'- `{k}`: {v}')
          lines.append('')
          if batch_errors:
              lines.append('## Batch Errors')
              lines.extend(f'- {e}' for e in batch_errors)
              lines.append('')
          if failures:
              lines.append('## Hard Field Failures')
              for loc, why in failures[:300]: lines.append(f'- {loc}: {why}')
              if len(failures) > 300: lines.append(f'- ...and {len(failures)-300} more')
              lines.append('')
          if warnings:
              lines.append('## Soft Warnings')
              for loc, why in warnings[:300]: lines.append(f'- {loc}: {why}')
              if len(warnings) > 300: lines.append(f'- ...and {len(warnings)-300} more')
              lines.append('')
          lines.append('## Proposed Gameplay Description Standard')
          lines.append('')
          lines.append('```json')
          lines.append('{')
          lines.append('  "id": "category/item_id",')
          lines.append('  "name": "Readable Item Name",')
          lines.append('  "shortDescription": "One clear sentence for market/inventory UI.",')
          lines.append('  "flavorText": "Optional one-line worldbuilding text.",')
          lines.append('  "family": "...",')
          lines.append('  "subfamily": "...",')
          lines.append('  "tags": ["..."]')
          lines.append('}')
          lines.append('```')
          report_path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print('\n'.join(lines[:60]))
          PY
      - name: Commit audit report
        run: |
          git config user.name "chatgpt-item-audit"
          git config user.email "chatgpt-item-audit@users.noreply.github.com"
          git add docs/ITEM_DESCRIPTION_AUDIT.md
          if git diff --cached --quiet; then
            echo "No audit report changes"
          else
            git commit -m "Add item description audit report"
            git push
          fi
