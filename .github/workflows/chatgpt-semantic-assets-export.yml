name: ChatGPT Semantic Assets Export

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          sparse-checkout: |
            docs/assets/icon-prompts
            docs/assets/icon-sheets
          sparse-checkout-cone-mode: true
          fetch-depth: 1

      - name: Create assets archive
        run: |
          set -euo pipefail
          mkdir -p /tmp/chatgpt-semantic-assets
          cp -R docs /tmp/chatgpt-semantic-assets/
          cd /tmp/chatgpt-semantic-assets
          zip -r /tmp/chatgpt-semantic-assets.zip docs/assets/icon-prompts docs/assets/icon-sheets

      - name: Upload semantic assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatgpt-semantic-assets
          path: /tmp/chatgpt-semantic-assets.zip
          if-no-files-found: error
          retention-days: 1

