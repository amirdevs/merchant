name: ChatGPT no-upscale clean item icons

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'chatgpt-icons-no-upscale-clean'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout branch with sparse assets
        uses: actions/checkout@v4
        with:
          ref: chatgpt-icons-no-upscale-clean
          fetch-depth: 1
          lfs: false
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            .gitattributes
            .github/workflows/chatgpt-icons-no-upscale-clean.yml
            docs/ITEM_ASSET_PIPELINE.md
            docs/assets/icon-prompts/**
            docs/assets/icon-sheets/**
            public/game-assets/items/**

      - name: Configure Git LFS and pull source sheets only
        run: |
          git lfs install
          git lfs pull -I "docs/assets/icon-sheets/items-*.png"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install image dependencies
        run: python -m pip install --upgrade pillow numpy

      - name: Generate no-upscale clean icons
        run: |
          rm -rf public/game-assets/items
          rm -rf docs/assets/icon-sheets/safe-crop docs/assets/icon-sheets/green-cleanup docs/assets/icon-sheets/upscale-4x-clean docs/assets/icon-sheets/no-upscale-clean
          mkdir -p public/game-assets/items docs/assets/icon-sheets/no-upscale-clean/qa-boards
          python <<'PY'
          import csv, json, os, re
          from collections import deque
          from pathlib import Path
          import numpy as np
          from PIL import Image, ImageDraw

          ROOT = Path('.')
          PROMPTS = ROOT / 'docs/assets/icon-prompts'
          SHEETS = ROOT / 'docs/assets/icon-sheets'
          OUT_ROOT = ROOT / 'public/game-assets/items'
          TRACE = ROOT / 'docs/assets/icon-sheets/no-upscale-clean'
          QA = TRACE / 'qa-boards'
          TARGET = 256
          OUT_ROOT.mkdir(parents=True, exist_ok=True)
          QA.mkdir(parents=True, exist_ok=True)

          allow_path = PROMPTS / 'few-variant-allowlist.json'
          allow = {}
          if allow_path.exists():
              allow = json.loads(allow_path.read_text(encoding='utf-8'))
          allowed_outputs = set(allow.get('allowedOutputPaths') or allow.get('allowOutputPaths') or [])
          allowed_names = set(allow.get('allowedItemNames') or allow.get('allowItems') or [])
          allowed_families = set(allow.get('allowedFamilies') or allow.get('allowFamilies') or [])
          allowed_subfamilies = set(allow.get('allowedSubfamilies') or allow.get('allowSubfamilies') or [])
          allowed_tags = set(allow.get('allowedTags') or allow.get('allowTags') or [])

          def slugify(text):
              s = str(text or 'item').strip().lower()
              s = re.sub(r'[^a-z0-9._/-]+', '-', s)
              s = re.sub(r'-+', '-', s).strip('-')
              return s or 'item'

          def normalize_output(raw):
              s = str(raw or '').replace('\\', '/').strip()
              if not s:
                  return ''
              if not s.endswith('.png'):
                  s += '.png'
              if s.startswith('public/game-assets/items/'):
                  return s
              if s.startswith('game-assets/items/'):
                  return 'public/' + s
              if s.startswith('items/'):
                  return 'public/game-assets/' + s
              if s.startswith('public/'):
                  return s
              return 'public/game-assets/items/' + s

          def get_slots(data):
              raw = data.get('slots') or data.get('order') or data.get('items') or []
              slots = []
              for item in raw:
                  if isinstance(item, str):
                      out = normalize_output(item)
                      slots.append({'name': Path(out).stem, 'output': out})
                  elif isinstance(item, dict):
                      out = item.get('output') or item.get('outputPath') or item.get('output_path') or item.get('path') or item.get('filename') or item.get('file') or item.get('id')
                      if not out:
                          out = slugify(item.get('name') or item.get('itemName') or item.get('title'))
                      slot = dict(item)
                      slot['output'] = normalize_output(out)
                      slots.append(slot)
              return slots

          def slot_name(slot):
              return str(slot.get('itemName') or slot.get('name') or slot.get('title') or slot.get('id') or Path(slot.get('output','')).stem)

          def infer_variant(slot):
              v = str(slot.get('variant') or slot.get('quantityVariant') or '').lower().strip()
              out = str(slot.get('output') or '').lower()
              name = slot_name(slot).lower()
              if v:
                  return v
              if '__few' in out or out.endswith('-few.png') or ' few' in name:
                  return 'few'
              if '__many' in out or out.endswith('-many.png') or ' many' in name:
                  return 'many'
              return 'one'

          def few_allowed(slot):
              out = slot.get('output') or ''
              rel = out.replace('public/game-assets/items/', '')
              stem = Path(out).stem
              name = slot_name(slot)
              fam = str(slot.get('family') or slot.get('category') or '')
              sub = str(slot.get('subfamily') or slot.get('subCategory') or '')
              tags = {str(t) for t in (slot.get('tags') or [])}
              return (
                  out in allowed_outputs or rel in allowed_outputs or stem in allowed_outputs or
                  name in allowed_names or stem in allowed_names or
                  fam in allowed_families or sub in allowed_subfamilies or bool(tags & allowed_tags)
              )

          def grid_box(size, idx):
              w, h = size
              col, row = idx % 10, idx // 10
              return (round(col*w/10), round(row*h/5), round((col+1)*w/10), round((row+1)*h/5))

          def green_mask(arr):
              rgb = arr[:, :, :3].astype(np.int16)
              alpha = arr[:, :, 3].astype(np.int16)
              r, g, b = rgb[:, :, 0], rgb[:, :, 1], rgb[:, :, 2]
              pure = (alpha > 0) & (g > 225) & (r < 70) & (b < 70)
              near = (alpha > 0) & (g > 150) & (g > r + 55) & (g > b + 55) & (r < 150) & (b < 150)
              return pure | near

          def edge_connected(mask):
              h, w = mask.shape
              out = np.zeros_like(mask, dtype=bool)
              q = deque()
              for x in range(w):
                  if mask[0, x]: out[0, x] = True; q.append((x, 0))
                  if mask[h-1, x]: out[h-1, x] = True; q.append((x, h-1))
              for y in range(h):
                  if mask[y, 0]: out[y, 0] = True; q.append((0, y))
                  if mask[y, w-1]: out[y, w-1] = True; q.append((w-1, y))
              while q:
                  x, y = q.popleft()
                  for nx, ny in ((x+1,y),(x-1,y),(x,y+1),(x,y-1)):
                      if 0 <= nx < w and 0 <= ny < h and mask[ny, nx] and not out[ny, nx]:
                          out[ny, nx] = True; q.append((nx, ny))
              return out

          def crop_slot(sheet, idx):
              w, h = sheet.size
              x0, y0, x1, y1 = grid_box((w, h), idx)
              cw, ch = x1 - x0, y1 - y0
              pad = int(min(cw, ch) * 0.18)
              rx0, ry0 = max(0, x0-pad), max(0, y0-pad)
              rx1, ry1 = min(w, x1+pad), min(h, y1+pad)
              region = sheet.crop((rx0, ry0, rx1, ry1)).convert('RGBA')
              arr = np.array(region)
              green = green_mask(arr)
              edge_green = edge_connected(green)
              visible = (arr[:, :, 3] > 5) & (~edge_green)

              tx0, ty0, tx1, ty1 = x0-rx0, y0-ry0, x1-rx0, y1-ry0
              target_visible = np.zeros_like(visible, dtype=bool)
              target_visible[ty0:ty1, tx0:tx1] = visible[ty0:ty1, tx0:tx1]
              if not target_visible.any():
                  target_visible = visible
              if not target_visible.any():
                  exact = sheet.crop((x0, y0, x1, y1)).convert('RGBA')
                  return center_canvas(remove_edge_green(exact)), 'FAIL_FALLBACK_EXACT'

              ys, xs = np.where(target_visible)
              bx0, by0, bx1, by1 = max(0, xs.min()-10), max(0, ys.min()-10), min(region.width, xs.max()+11), min(region.height, ys.max()+11)
              cut_arr = arr[by0:by1, bx0:bx1].copy()
              cut_edge_green = edge_green[by0:by1, bx0:bx1]
              cut_arr[cut_edge_green, 3] = 0
              cut = Image.fromarray(cut_arr, 'RGBA')
              bbox = cut.getbbox()
              if bbox:
                  cut = cut.crop(bbox)
              return center_canvas(cut), 'PASS'

          def remove_edge_green(im):
              arr = np.array(im.convert('RGBA'))
              eg = edge_connected(green_mask(arr))
              arr[eg, 3] = 0
              return Image.fromarray(arr, 'RGBA')

          def center_canvas(icon):
              bbox = icon.getbbox()
              if not bbox:
                  return Image.new('RGBA', (TARGET, TARGET), (0,0,0,0))
              icon = icon.crop(bbox)
              scale = min((TARGET-32)/max(1, icon.width), (TARGET-32)/max(1, icon.height), 1.0)
              nw, nh = max(1, int(round(icon.width*scale))), max(1, int(round(icon.height*scale)))
              if (nw, nh) != icon.size:
                  icon = icon.resize((nw, nh), Image.Resampling.LANCZOS)
              canvas = Image.new('RGBA', (TARGET, TARGET), (0,0,0,0))
              canvas.alpha_composite(icon, ((TARGET-nw)//2, (TARGET-nh)//2))
              return canvas

          rows = []
          summary = []
          written = skipped_few = failures = sheets_processed = total_slots = 0
          configs = sorted(p for p in PROMPTS.glob('items-*.json') if p.name != 'few-variant-allowlist.json')
          for cfg in configs:
              data = json.loads(cfg.read_text(encoding='utf-8'))
              slots = get_slots(data)
              total_slots += len(slots)
              sheet_path = SHEETS / (cfg.stem + '.png')
              if not sheet_path.exists():
                  summary.append([cfg.stem, 'FAIL', 0, 'missing sheet'])
                  failures += 1
                  continue
              sheet = Image.open(sheet_path).convert('RGBA')
              sheets_processed += 1
              sheet_written = sheet_skip = sheet_fail = 0
              thumbs = []
              for idx, slot in enumerate(slots[:50]):
                  variant = infer_variant(slot)
                  outp = slot.get('output')
                  if variant == 'few' and not few_allowed(slot):
                      skipped_few += 1; sheet_skip += 1
                      rows.append([cfg.stem, idx+1, 'SKIP_FEW', slot_name(slot), variant, outp])
                      continue
                  icon, status = crop_slot(sheet, idx)
                  dest = ROOT / outp
                  dest.parent.mkdir(parents=True, exist_ok=True)
                  icon.save(dest, 'PNG', optimize=True)
                  written += 1; sheet_written += 1
                  if status != 'PASS':
                      failures += 1; sheet_fail += 1
                  rows.append([cfg.stem, idx+1, status, slot_name(slot), variant, outp])
                  thumbs.append((idx+1, icon, status, Path(outp).name))

              cols, cell, labh, pad = 10, 104, 30, 8
              board = Image.new('RGB', (cols*(cell+pad)+pad, 5*(cell+labh+pad)+pad), (35,35,35))
              d = ImageDraw.Draw(board)
              for j, (slot_no, icon, status, name) in enumerate(thumbs[:50]):
                  row, col = j // 10, j % 10
                  x, y = pad + col*(cell+pad), pad + row*(cell+labh+pad)
                  bg = Image.new('RGB', (cell, cell), (220,220,220))
                  bd = ImageDraw.Draw(bg)
                  for yy in range(0, cell, 8):
                      for xx in range(0, cell, 8):
                          if (xx//8 + yy//8) % 2:
                              bd.rectangle([xx, yy, xx+7, yy+7], fill=(180,180,180))
                  ic = icon.copy(); ic.thumbnail((cell, cell), Image.Resampling.LANCZOS)
                  bg.paste(ic, ((cell-ic.width)//2, (cell-ic.height)//2), ic)
                  board.paste(bg, (x, y))
                  d.rectangle([x, y, x+cell-1, y+cell-1], outline=(60,210,80) if status=='PASS' else (255,80,80), width=2)
                  d.text((x, y+cell+2), f'{slot_no:02d} {name[:18]}', fill=(240,240,240))
              board.save(QA / (cfg.stem + '-qa.jpg'), quality=88)
              summary.append([cfg.stem, 'PASS' if sheet_fail == 0 else 'WARN', sheet_written, f'skipped_few={sheet_skip}; fail={sheet_fail}'])

          with (TRACE / 'NO_UPSCALE_CROP_CELLS.csv').open('w', newline='', encoding='utf-8') as f:
              w = csv.writer(f); w.writerow(['sheet','slot','status','name','variant','output']); w.writerows(rows)
          with (TRACE / 'NO_UPSCALE_SUMMARY.csv').open('w', newline='', encoding='utf-8') as f:
              w = csv.writer(f); w.writerow(['sheet','status','icons_written','note']); w.writerows(summary)
          report = f'''# No-Upscale Clean Icon Report

- Prompt files processed: {len(configs)}
- Sheets processed: {sheets_processed}
- Source slots read: {total_slots}
- Icons written: {written}
- Few variants skipped by default: {skipped_few}
- Failed crops: {failures}
- Output size: {TARGET}x{TARGET} transparent PNG
- Upscaling: disabled
- Cleanup policy: only green background connected to crop edges is removed; interior green pixels are preserved.
- Variant policy: keep `one` and `many` for all items; keep `few` only when listed in `docs/assets/icon-prompts/few-variant-allowlist.json`.

See `NO_UPSCALE_CROP_CELLS.csv`, `NO_UPSCALE_SUMMARY.csv`, and `qa-boards/`.
'''
          (TRACE / 'NO_UPSCALE_CROP_REPORT.md').write_text(report, encoding='utf-8')
          print(report)
          if written < 3000:
              raise SystemExit(f'icon count too low: {written}')
          if failures:
              raise SystemExit(f'crop failures found: {failures}')
          PY

      - name: Stage clean replacement and remove temporary workflow
        run: |
          git lfs install
          git config user.name "chatgpt-icon-pipeline"
          git config user.email "chatgpt-icon-pipeline@users.noreply.github.com"
          git rm -r --ignore-unmatch public/game-assets/items docs/assets/icon-sheets/safe-crop docs/assets/icon-sheets/green-cleanup docs/assets/icon-sheets/upscale-4x-clean
          git add .gitattributes docs/assets/icon-prompts/few-variant-allowlist.json public/game-assets/items docs/assets/icon-sheets/no-upscale-clean
          git rm -f --ignore-unmatch .github/workflows/chatgpt-icons-no-upscale-clean.yml
          git status --short
          test "$(find public/game-assets/items -type f -name '*.png' | wc -l)" -gt 3000
          git commit -m "Regenerate item icons without upscaling"
          git push origin HEAD:chatgpt-icons-no-upscale-clean
